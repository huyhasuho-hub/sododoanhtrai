            <button onclick="switchView('nav')">HƯỚNG DẪN ĐƯỜNG NỘI BỘ</button>
            <button onclick="openGMap()">GOOGLE MAP</button>
        </div>

        <div id="navView" style="display:none">
            <div class="view-box" id="navBox">📷 Ảnh lộ trình</div>

const container = document.getElementById('hotspot-container');
const list = document.getElementById('listContent');

data.forEach(item => {
    const spot = document.createElement('div');
    spot.className = 'hotspot';
    spot.style.top = item.t + '%';
    spot.style.left = item.l + '%';
    spot.onclick = () => openModal(item);
    container.appendChild(spot);

    const li = document.createElement('div');
    li.innerHTML = `<b>${item.id}</b>: ${item.name}`;
    li.onclick = () => openModal(item);
    list.appendChild(li);
});

/* 🔥 FIX CHÍNH Ở ĐÂY */
function openModal(item) {
    currentItem = item;

    document.getElementById('mTitle').innerText = item.id;
    document.getElementById('mDesc').innerText = item.name;
    document.getElementById('infoModal').style.display = 'block';

    const img = imageData[item.id];

    document.getElementById('picBox').innerHTML =
        img?.real ? `<img src="${img.real}" style="max-width:100%">` : "📷 Chưa có ảnh";

    document.getElementById('navBox').innerHTML =
        img?.nav ? `<img src="${img.nav}" style="max-width:100%">` : "📷 Chưa có ảnh";

    switchView('main');
}

function switchView(v) {
    document.getElementById('mainView').style.display = v === 'main' ? 'block' : 'none';
    document.getElementById('navView').style.display = v === 'nav' ? 'block' : 'none';
}

function openGMap() {
    window.open(`https://www.google.com/maps`, '_blank');
}

function toggleList() {
    const p = document.getElementById('listPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function closeModal() {
    document.getElementById('infoModal').style.display = 'none';
}
